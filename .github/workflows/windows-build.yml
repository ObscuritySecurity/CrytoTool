name: Windows Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: 24
  RUST_TOOLCHAIN: stable
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Build Web Dist
        run: npm run build

      - name: Upload Dist Artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist

  build-windows-x86_64:
    needs: build-web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust (${{ env.RUST_TOOLCHAIN }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Frontend Deps
        run: npm install

      - name: Download Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Build Tauri App (x86_64)
        run: npx --yes @tauri-apps/cli@latest build --target x86_64-pc-windows-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Installer (x86_64)
        uses: actions/upload-artifact@v6
        with:
          name: crytotool-windows-x86_64
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

      - name: Upload Raw Binary (x86_64)
        uses: actions/upload-artifact@v6
        with:
          name: crytotool-windows-x86_64-raw.exe
          path: src-tauri/target/x86_64-pc-windows-msvc/release/crytotool.exe

  build-windows-arm64:
    needs: build-web
    runs-on: windows-latest
    env:
      CARGO_BUILD_TARGET: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust (${{ env.RUST_TOOLCHAIN }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-pc-windows-msvc

      - name: Install Frontend Deps
        run: npm install

      - name: Download Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Build Tauri App (ARM64)
        run: npx --yes @tauri-apps/cli@latest build --target aarch64-pc-windows-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Installer (ARM64)
        uses: actions/upload-artifact@v6
        with:
          name: crytotool-windows-arm64
          path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe

      - name: Upload Raw Binary (ARM64)
        uses: actions/upload-artifact@v6
        with:
          name: crytotool-windows-arm64-raw.exe
          path: src-tauri/target/aarch64-pc-windows-msvc/release/crytotool.exe
