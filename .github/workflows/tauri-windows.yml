name: Release (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Patch version for MSI compatibility
        shell: powershell
        run: (Get-Content src-tauri/tauri.conf.json) -replace '"2.5.0-beta"', '"2.5.0"' | Set-Content src-tauri/tauri.conf.json

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CrytoTool ${{ github.ref_name }}'
          releaseBody: 'CrytoTool ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false