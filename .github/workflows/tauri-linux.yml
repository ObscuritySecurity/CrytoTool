name: Release (Linux)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            file \
            wget \
            curl \
            xz-utils

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build Tauri binary (no bundle)
        run: npx tauri build --no-bundle

      - name: Locate built binary
        id: locate
        run: |
          set -e
          BIN=$(find src-tauri/target/release -maxdepth 1 -type f -executable \
            -not -name '*.so' -not -name '*.d' -not -name 'build-*' | head -1)
          if [ -z "$BIN" ]; then
            echo "::error::Could not locate built binary in src-tauri/target/release/"
            ls -la src-tauri/target/release/ || true
            exit 1
          fi
          echo "binary=$(realpath $BIN)" >> "$GITHUB_OUTPUT"
          echo "Located binary: $BIN"

      - name: Install quick-sharun
        run: |
          wget -q https://raw.githubusercontent.com/pkgforge-dev/Anylinux-AppImages/main/useful-tools/quick-sharun.sh
          chmod +x quick-sharun.sh
          ./quick-sharun.sh --help | head -3

      - name: Install standard appimagetool (probonopd, squashfs format)
        run: |
          cd /tmp
          wget -q https://github.com/probonopd/go-appimage/releases/download/continuous/appimagetool-940-x86_64.AppImage
          chmod +x appimagetool-940-x86_64.AppImage
          ./appimagetool-940-x86_64.AppImage --appimage-extract > /dev/null
          ls -la squashfs-root/usr/bin/appimagetool
          ./squashfs-root/usr/bin/appimagetool --version
          echo "Static appimagetool ready at /tmp/squashfs-root/usr/bin/appimagetool"

      - name: Build truly-portable AppImage with quick-sharun
        env:
          DEPLOY_GTK: 1
          DEPLOY_OPENGL: 1
          DEPLOY_VULKAN: 1
          DEPLOY_GSTREAMER: 1
          DEPLOY_PIPEWIRE: 1
          DEPLOY_PULSE: 1
          OUTPUT_APPIMAGE: 1
          APPIMAGE_NAME: CrytoTool
          APPIMAGETOOL: /tmp/squashfs-root/usr/bin/appimagetool
          VERSION: ${{ github.ref_name }}
          DESKTOP: ${{ github.workspace }}/src-tauri/crytotool.desktop
          ICON: ${{ github.workspace }}/src-tauri/icons/icon.png
          WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS: 1
          WEBKIT_DISABLE_DMABUF_RENDERER: 1
          WEBKIT_DISABLE_COMPOSITING_MODE: 1
        run: |
          set -e
          # Increase namespace limits to prevent ENOSPC errors
          sudo sysctl -w user.max_user_namespaces=15000 || true
          STDERR_LOG=$(mktemp)
          ./quick-sharun.sh "${{ steps.locate.outputs.binary }}" 2> "$STDERR_LOG"
          grep -v "tr: write error: Broken pipe" "$STDERR_LOG" >&2 || true
          rm -f "$STDERR_LOG"
          echo "---"
          echo "Generated AppImage:"
          ls -la *.AppImage
          file *.AppImage

      - name: Rename AppImage
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          mv CrytoTool*.AppImage "CrytoTool_${TAG}_amd64.AppImage" 2>/dev/null || \
            mv *.AppImage "CrytoTool_${TAG}_amd64.AppImage"
          ls -la *.AppImage
          echo "Final size:"
          du -h *.AppImage

      - name: Upload AppImage to release
        uses: softprops/action-gh-release@v3
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CrytoTool ${{ github.ref_name }}'
          releaseBody: 'CrytoTool ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          files: |
            *.AppImage
