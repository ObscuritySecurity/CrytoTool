name: Build Universal Linux App
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04 # Folosește o versiune mai veche pentru compatibilitate glibc mai largă
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Deps
        run: npm install # sau yarn/pnpm

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # Va prelua versiunea din tauri.conf.json
          releaseName: "App Release v__VERSION__"
          releaseBody: "Universal Linux Executable (x86_64)"
          releaseDraft: true
          prerelease: false
