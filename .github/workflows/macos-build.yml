name: macOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: 24
  RUST_TOOLCHAIN: stable
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      
      - name: Install Dependencies
        run: npm install
      
      - name: Build Web Dist
        run: npm run build
      
      - name: Upload Dist Artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist

  build-macos:
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            target: x86_64-apple-darwin
            artifact: crytotool-macos-intel
          - runner: macos-14
            target: aarch64-apple-darwin
            artifact: crytotool-macos-apple-silicon
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      
      - name: Install Rust (${{ env.RUST_TOOLCHAIN }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install Frontend Deps
        run: npm install
      
      - name: Download Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      
      - name: Build Tauri App
        run: npx --yes @tauri-apps/cli@latest build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Installer (Bundle)
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/dmg/*.dmg
      
      - name: Upload Raw Binary (Intel x86_64)
        if: matrix.target == 'x86_64-apple-darwin'
        uses: actions/upload-artifact@v6
        with:
          name: crytotool-macos-intel-raw.app
          path: src-tauri/target/release/CrytoTool.app
      
      - name: Upload Raw Binary (Apple Silicon ARM64)
        if: matrix.target == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@v6
        with:
          name: crytotool-macos-arm64-raw.app
          path: src-tauri/target/release/CrytoTool.app
