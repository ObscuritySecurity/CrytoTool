name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * 1'  # Luni la 02:00

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # 1. Git Security Scanner - Gitleaks + Trivy (fără API key)
  git-security:
    name: Git Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Git Security Scanner
        uses: cloudon-one/git-security-scanner@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          scan_type: all
          fail_on_critical: true
          upload_sarif: true
          create_pr_comment: true

  # 2. Snyk - Vulnerabilități dependențe + cod
  snyk:
    name: Snyk Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Run Snyk Code (SAST)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=high
