name: Capacitor Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build web assets
      run: npm run build
    
    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Android SDK Platform 35
      run: sdkmanager "platforms;android-35"
    
    - name: Sync Capacitor
      run: npx cap sync android
    
    - name: Configure Gradle Java Home
      working-directory: ./android
      run: |
        echo "" >> gradle.properties
        echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties
    
    - name: Build Android
      working-directory: ./android
      run: ./gradlew assembleRelease
    
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: android-release-apk
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk

  build-ios:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build web assets
      run: npm run build
    
    - name: Sync Capacitor
      run: npx cap sync ios
    
    - name: Build iOS
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -archivePath App.xcarchive archive
    
    - name: Upload iOS Archive
      uses: actions/upload-artifact@v4
      with:
        name: ios-release-archive
        path: ios/App/App.xcarchive
