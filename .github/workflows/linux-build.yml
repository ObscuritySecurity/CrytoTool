name: Linux Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: 24
  RUST_TOOLCHAIN: stable
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      
      - name: Install Dependencies
        run: npm install
      
      - name: Build Web Dist
        run: npm run build
      
      - name: Upload Dist Artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist

  build-linux:
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
            artifact: crytotool-linux-x86_64
            cross_compile: false
            bundles: "--bundles deb,appimage,rpm"
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            artifact: crytotool-linux-arm64
            cross_compile: true
            bundles: "--bundles deb,appimage,rpm"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      
      - name: Install Rust (${{ env.RUST_TOOLCHAIN }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm
      
      - name: Install Cross-Compilation Tools (32-bit)
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-i686-linux-gnu g++-i686-linux-gnu
          mkdir -p ~/.cargo
          echo '[target.i686-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "i686-linux-gnu-gcc"' >> ~/.cargo/config.toml
      
      - name: Install Cross-Compilation Tools (ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          mkdir -p ~/.cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
      
      - name: Install Frontend Deps
        run: npm install
      
      - name: Download Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      
      - name: Build Tauri App
        run: npx --yes @tauri-apps/cli@latest build ${{ matrix.bundles }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Debug - List Build Output
        if: always()
        run: |
          echo "=== Searching for bundle files ==="
          find src-tauri/target -type d -name "bundle" 2>/dev/null | head -10
          echo "=== Checking target folder ==="
          ls -la src-tauri/target/${{ matrix.target }}/release/bundle/ 2>/dev/null || echo "Not found"
          echo "=== Checking default release folder ==="
          ls -la src-tauri/target/release/bundle/ 2>/dev/null || echo "Not found"
      
      - name: Upload All Bundles
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/**/bundle/**
      
      - name: Upload Artifact (Cross-compiled ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm/*.rpm
