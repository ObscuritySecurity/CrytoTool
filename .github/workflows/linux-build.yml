name: Linux Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: 24
  RUST_TOOLCHAIN: stable
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Build Web Dist
        run: npm run build

      - name: Upload Dist Artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist

  build-linux-x86_64:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust (${{ env.RUST_TOOLCHAIN }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Install Frontend Deps
        run: npm install

      - name: Download Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Build Tauri App (x86_64)
        run: npx --yes @tauri-apps/cli@latest build --target x86_64-unknown-linux-gnu --bundles deb,appimage,rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Bundles (x86_64)
        uses: actions/upload-artifact@v6
        with:
          name: crytotool-linux-x86_64
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm

      - name: Upload Raw Binary (x86_64)
        uses: actions/upload-artifact@v6
        with:
          name: crytotool-linux-x86_64-raw
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/crytotool

  build-linux-arm64:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust (${{ env.RUST_TOOLCHAIN }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Cross-Compilation Tools (ARM64)
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            pkg-config-aarch64-linux-gnu \
            libgtk-3-dev:arm64 libwebkit2gtk-4.1-dev:arm64 \
            libappindicator3-dev:arm64 librsvg2-dev:arm64 \
            patchelf rpm
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
          echo "CARGO_BUILD_TARGET=aarch64-unknown-linux-gnu" >> $GITHUB_ENV
          echo "PKG_CONFIG=aarch64-linux-gnu-pkg-config" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV

      - name: Install Frontend Deps
        run: npm install

      - name: Download Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Build Tauri App (ARM64)
        run: npx --yes @tauri-apps/cli@latest build --target aarch64-unknown-linux-gnu --bundles deb,appimage,rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Bundles (ARM64)
        uses: actions/upload-artifact@v6
        with:
          name: crytotool-linux-arm64
          path: |
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm/*.rpm

      - name: Upload Raw Binary (ARM64)
        uses: actions/upload-artifact@v6
        with:
          name: crytotool-linux-arm64-raw
          path: src-tauri/target/aarch64-unknown-linux-gnu/release/crytotool
