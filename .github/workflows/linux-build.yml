name: Linux Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: 24
  RUST_TOOLCHAIN: stable
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Build Web Dist
        run: npm run build

      - name: Upload Dist Artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist

  build-linux-x86_64:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust (${{ env.RUST_TOOLCHAIN }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux Dependencies (x86_64 only)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Install Frontend Deps
        run: npm install

      - name: Download Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Build Tauri App (x86_64)
        shell: bash
        run: |
          export CARGO_BUILD_TARGET=x86_64-unknown-linux-gnu
          npx --yes @tauri-apps/cli@latest build --target x86_64-unknown-linux-gnu --bundles deb,appimage,rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Bundles (x86_64)
        uses: actions/upload-artifact@v6
        with:
          name: crytotool-linux-x86_64
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm

      - name: Upload Raw Binary (x86_64)
        uses: actions/upload-artifact@v6
        with:
          name: crytotool-linux-x86_64-raw
          path: src-tauri/target/x86_64-unknown-linux-gnu/release/crytotool

  build-linux-arm64:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust (${{ env.RUST_TOOLCHAIN }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Cross-Compilation Tools (ARM64)
        shell: bash
        run: |
          # Install cross-compiler (amd64 packages)
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            patchelf rpm
          
          # Add arm64 architecture
          sudo dpkg --add-architecture arm64
          
          # Fix DEB822 sources to exclude security.ubuntu.com for arm64
          # security.ubuntu.com doesn't have arm64 packages for noble
          sudo sed -i 's|^Types: deb$|Types: deb [arch=amd64]|g' /etc/apt/sources.list.d/ubuntu.sources
          
          # Update package lists (ignore errors from security.ubuntu.com)
          sudo apt-get update 2>&1 | grep -v "404  Not Found" || true
          
          # Install arm64 libraries
          sudo apt-get install -y \
            libgtk-3-dev:arm64 \
            libwebkit2gtk-4.1-dev:arm64 \
            libappindicator3-dev:arm64 \
            librsvg2-dev:arm64 \
            || echo "Warning: Some arm64 libraries may have failed"
          
          # Configure cargo for cross-compilation
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Install Frontend Deps
        run: npm install

      - name: Download Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Build Tauri App (ARM64)
        shell: bash
        run: |
          export CARGO_BUILD_TARGET=aarch64-unknown-linux-gnu
          export PKG_CONFIG=aarch64-linux-gnu-pkg-config
          export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          npx --yes @tauri-apps/cli@latest build --target aarch64-unknown-linux-gnu --bundles deb,appimage,rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug - List ARM64 Build Output
        if: always()
        shell: bash
        run: |
          echo "=== ARM64 Target Files ==="
          file src-tauri/target/aarch64-unknown-linux-gnu/release/crytotool 2>/dev/null || echo "Binary not found"
          find src-tauri/target/aarch64-unknown-linux-gnu/release/bundle -type f 2>/dev/null || echo "No bundle files found"

      - name: Upload Bundles (ARM64)
        uses: actions/upload-artifact@v6
        with:
          name: crytotool-linux-arm64
          path: |
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm/*.rpm

      - name: Upload Raw Binary (ARM64)
        uses: actions/upload-artifact@v6
        with:
          name: crytotool-linux-arm64-raw
          path: src-tauri/target/aarch64-unknown-linux-gnu/release/crytotool
