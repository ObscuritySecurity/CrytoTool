name: Linux Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: 24
  RUST_TOOLCHAIN: stable
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Build Web Dist
        run: npm run build

      - name: Upload Dist Artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist

  build-linux:
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
            artifact: crytotool-linux-x86_64
            bundles: "--bundles deb,appimage,rpm"
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            artifact: crytotool-linux-arm64
            bundles: "--bundles deb,appimage,rpm"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Rust (${{ env.RUST_TOOLCHAIN }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            echo "Setting up arm64 cross-compilation"
            sudo dpkg --add-architecture arm64
            sudo apt-get update
            sudo apt-get install -y \
              libgtk-3-dev:arm64 \
              libwebkit2gtk-4.1-dev:arm64 \
              libappindicator3-dev:arm64 \
              librsvg2-dev:arm64 \
              patchelf \
              rpm
          else
            sudo apt-get install -y \
              libgtk-3-dev \
              libwebkit2gtk-4.1-dev \
              libappindicator3-dev \
              librsvg2-dev \
              patchelf \
              rpm
          fi

      - name: Install Cross-Compilation Tools (ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          mkdir -p ~/.cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> ~/.cargo/config.toml

      - name: Install Frontend Deps
        run: npm install

      - name: Download Dist Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Build Tauri App (${{ matrix.target }})
        run: npx --yes @tauri-apps/cli@latest build --target ${{ matrix.target }} ${{ matrix.bundles }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug - List Build Output
        if: always()
        run: |
          echo "=== Target: ${{ matrix.target }} ==="
          ls -la src-tauri/target/${{ matrix.target }}/release/bundle/ 2>/dev/null || echo "Bundle folder not found"
          find src-tauri/target/${{ matrix.target }}/release/bundle -type f 2>/dev/null || echo "No bundle files found"

      - name: Upload Bundles (${{ matrix.arch }})
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm

      - name: Upload Raw Binary (${{ matrix.arch }})
        uses: actions/upload-artifact@v6
        with:
          name: crytotool-linux-${{ matrix.arch }}-raw
          path: src-tauri/target/${{ matrix.target }}/release/crytotool
