name: Release (Android)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Init Android project
        run: |
          echo "y" | npm run tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Generate app icons
        run: npm run tauri icon assets/CrytoTool.png

      - name: Build APK
        run: npm run tauri android build -- --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Find APK
        run: find src-tauri -name "*.apk" -type f 2>/dev/null || echo "No APK found"

- name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias crytotool -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass crytotool123 -keypass crytotool123 \
            -dname "CN=CrytoTool, O=CrytoTool, C=US"

- name: Sign APK
        run: |
          UNSIGNED="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk"
          SIGNED="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-signed.apk"
          BUILD_TOOLS="${ANDROID_HOME}/build-tools/35.0.0"
          
          "$BUILD_TOOLS/zipalign" -v -p 4 "$UNSIGNED" "${UNSIGNED%.apk}-aligned.apk"
          "$BUILD_TOOLS/apksigner" sign \
            --ks release.keystore \
            --ks-pass pass:crytotool123 \
            --key-pass pass:crytotool123 \
            --out "$SIGNED" "${UNSIGNED%.apk}-aligned.apk"
          
          echo "APK signed successfully"
          "$BUILD_TOOLS/apksigner" verify -v "$SIGNED"

- name: Rename APK
        run: |
          APK="src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-signed.apk"
          if [ -f "$APK" ]; then
            cp "$APK" "CrytoTool-${{ steps.version.outputs.version }}-android.apk"
            echo "APK signed and renamed"
          fi

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: CrytoTool-*-android.apk

      - name: Upload APK artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/