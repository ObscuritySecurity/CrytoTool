name: Release (Android)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: './src-tauri -> target'

      - name: Setup wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa

      - name: Install dependencies
        run: npm ci

      - name: Build WASM
        run: npm run build:wasm

      - name: Build web assets
        run: npm run build

      - name: Init Android project
        run: echo "y" | npm run tauri android init


      - name: Generate app icons
        run: npm run tauri -- icon src-tauri/icon-sources/icon-manifest.json -o src-tauri/icons

      - name: Build Universal APK
        run: npm run tauri android build -- --apk

      - name: Find APK files
        run: |
          echo "=== Finding APKs ==="
          find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f

      - name: Generate debug keystore
        env:
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'privon123' }}
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias privon -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KEYSTORE_PASS" -keypass "$KEYSTORE_PASS" \
            -dname "CN=PrivonVault, O=PrivonVault, C=US"

      - name: Sign APK
        env:
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'privon123' }}
        run: |
          BUILD_TOOLS="${ANDROID_HOME}/build-tools/35.0.0"
          
          UNSIGNED=$(find src-tauri/gen/android/app/build/outputs/apk -name "*-release-unsigned.apk" | head -1)
          
          if [ -n "$UNSIGNED" ]; then
            ALIGNED="${UNSIGNED%.apk}-aligned.apk"
            SIGNED="${UNSIGNED%.apk}-signed.apk"
            
            "$BUILD_TOOLS/zipalign" -v -p 4 "$UNSIGNED" "$ALIGNED"
            "$BUILD_TOOLS/apksigner" sign \
              --ks release.keystore \
              --ks-pass pass:"$KEYSTORE_PASS" \
              --key-pass pass:"$KEYSTORE_PASS" \
              --out "$SIGNED" "$ALIGNED"
            
            rm -f "$ALIGNED"
            cp "$SIGNED" PrivonVault-android.apk
            echo "=== Signed APK: PrivonVault-android.apk ==="
            ls -la PrivonVault-android.apk
          else
            echo "No unsigned APK found!"
            find src-tauri/gen/android/app/build/outputs/apk -name "*.apk"
          fi

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: PrivonVault-android.apk

      - name: Upload artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: android-apk
          path: PrivonVault-android.apk