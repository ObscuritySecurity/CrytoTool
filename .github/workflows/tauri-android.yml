name: Release (Android)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set Rust optimization
        run: |
          echo "CARGO_PROFILE_RELEASE_LTO=true" >> $GITHUB_ENV
          echo "CARGO_PROFILE_RELEASE_OPT_LEVEL=z" >> $GITHUB_ENV
          echo "CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1" >> $GITHUB_ENV

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Init Android project
        run: |
          echo "y" | npm run tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Generate app icons
        run: npm run tauri icon assets/CrytoTool.png

      - name: Build APK per architecture
        run: npm run tauri android build -- --apk --split-per-abi
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Debug - list APK files
        run: |
          echo "=== Finding all APKs ==="
          find . -name "*.apk" -type f 2>/dev/null
          ls -la src-tauri/gen/android/app/build/outputs/apk/ 2>/dev/null || echo "No outputs dir"

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias crytotool -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass crytotool123 -keypass crytotool123 \
            -dname "CN=CrytoTool, O=CrytoTool, C=US"

      - name: Sign and rename APKs
        run: |
          BUILD_TOOLS="${ANDROID_HOME}/build-tools/35.0.0"
          VERSION="${{ steps.version.outputs.version }}"
          
          # Find and process all unsigned APKs
          for APK in $(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" -type f 2>/dev/null | grep -v aligned | grep -v signed); do
            ARCH=$(basename $(dirname $(dirname $APK)))
            echo "Processing: $APK (arch: $ARCH)"
            
            ALIGNED="${APK%.apk}-aligned.apk"
            SIGNED="${APK%.apk}-signed.apk"
            
            "$BUILD_TOOLS/zipalign" -v -p 4 "$APK" "$ALIGNED"
            "$BUILD_TOOLS/apksigner" sign \
              --ks release.keystore \
              --ks-pass pass:crytotool123 \
              --key-pass pass:crytotool123 \
              --out "$SIGNED" "$ALIGNED"
            
            rm -f "$ALIGNED"
            
            # Copy to root with proper name
            cp "$SIGNED" "CrytoTool-${VERSION}-android-${ARCH}.apk"
            echo "Created: CrytoTool-${VERSION}-android-${ARCH}.apk"
          done
          
          echo "=== Final APK files ==="
          ls -la CrytoTool-*.apk 2>/dev/null || echo "No APK files found"

      - name: List all APK files
        run: |
          echo "=== All APK files in project ==="
          find . -name "*.apk" -type f 2>/dev/null

      - name: Upload all APKs to Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd src-tauri/gen/android/app/build/outputs/apk
          for f in $(find . -name "*.apk" -type f); do
            echo "Uploading: $f"
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done