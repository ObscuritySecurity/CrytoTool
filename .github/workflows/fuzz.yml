name: Fuzz

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-fuzz:
    name: Build fuzz targets
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install nightly Rust (2026-06-01)
        run: |
          rustup install nightly-2026-06-01
          rustup default nightly-2026-06-01

      - name: Install cargo-fuzz v0.13.2
        run: cargo install cargo-fuzz --locked --version 0.13.2

      - name: Build fuzz targets
        working-directory: crypto-core
        run: cargo fuzz build

  fuzz:
    name: Run fuzz tests
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install nightly Rust (2026-06-01)
        run: |
          rustup install nightly-2026-06-01
          rustup default nightly-2026-06-01

      - name: Install cargo-fuzz v0.13.2
        run: cargo install cargo-fuzz --locked --version 0.13.2

      - name: Build fuzz targets
        working-directory: crypto-core
        run: cargo fuzz build

      - name: Fuzz AES-GCM roundtrip
        working-directory: crypto-core
        run: cargo fuzz run aes_gcm_roundtrip -- -max_total_time=60

      - name: Fuzz Base64 roundtrip
        working-directory: crypto-core
        run: cargo fuzz run base64_roundtrip -- -max_total_time=60
