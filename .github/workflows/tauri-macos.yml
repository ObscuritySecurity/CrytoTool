name: Release (macOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Build Apple Silicon
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Build Intel
        run: npm run tauri build -- --target x86_64-apple-darwin

      - name: Find all bundle files
        run: |
          echo "=== Looking for bundles ==="
          ls -la src-tauri/target/release/bundle/ 2>/dev/null || echo "No bundle dir"
          find src-tauri/target/release/bundle -type f 2>/dev/null

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            src-tauri/target/release/bundle/macos/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/darwin/*.dmg
            src-tauri/target/release/bundle/darwin/*.app

      - name: Upload artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: src-tauri/target/release/bundle/