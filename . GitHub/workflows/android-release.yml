name: 'CrytoTool Android Release'

on:
  push:
    tags:
      - 'android-v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9.0
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;25.2.9519653'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android'

      - name: Install pnpm & frontend deps
        run: |
          npm install -g pnpm
          pnpm install

      - name: Generate icons (dacă nu sunt deja generate)
        run: pnpm tauri icon ./assets/CryptoTool.png --output ./src-tauri/icons || true

      - name: Setup Android signing (opțional pentru release)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > src-tauri/gen/android/app/keystore.jks
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD" >> src-tauri/gen/android/gradle.properties
            echo "keyPassword=$ANDROID_KEY_PASSWORD" >> src-tauri/gen/android/gradle.properties
            echo "keyAlias=$ANDROID_KEY_ALIAS" >> src-tauri/gen/android/gradle.properties
            echo "storeFile=keystore.jks" >> src-tauri/gen/android/gradle.properties
          fi

      - name: Build Android APK & AAB
        run: pnpm tauri android build --release

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/release/*.aab
          tag_name: ${{ github.ref_name }}
          name: 'CrytoTool ${{ github.ref_name }}'
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
