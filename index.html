
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>CrytoTool</title>
    
    <script>
      // Load saved theme immediately to prevent flash
      (function() {
        const savedTheme = JSON.parse(localStorage.getItem('app_theme_config') || '{}');
        // Manual accent override wins over theme config
        const manualAccent = localStorage.getItem('app_accent_manual');
        if (manualAccent) {
          savedTheme['--accent-color'] = manualAccent;
        }
        const savedFont = 'ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif';
        
        const root = document.documentElement;
        
        // Defaults — official branding: matte metallic white accent on black
        const defaults = {
          '--accent-color': '#E8E8E8',
          '--bg-main': '#000000',
          '--bg-card': '#09090b',
          '--bg-surface': '#18181b',
          '--border-color': '#27272a',
          '--text-main': '#ffffff',
          '--text-muted': '#a1a1aa'
        };

        const config = { ...defaults, ...savedTheme };

        // Apply theme variables
        Object.entries(config).forEach(([key, val]) => {
          root.style.setProperty(key, val);
        });
        
        // Apply font variable
        root.style.setProperty('--app-font', savedFont);

        // Set RGB for accent alpha/opacity utilities
        const accentHex = config['--accent-color'];
        if (accentHex) {
           const r = parseInt(accentHex.slice(1, 3), 16);
           const g = parseInt(accentHex.slice(3, 5), 16);
           const b = parseInt(accentHex.slice(5, 7), 16);
           root.style.setProperty('--accent-rgb', `${r}, ${g}, ${b}`);
        }

        // Glass intensity (0-100, default 100 = full)
        const glassIntensity = parseInt(localStorage.getItem('app_glass_intensity') || '100') / 100;
        const gm = Math.max(0, Math.min(1, glassIntensity));
        root.style.setProperty('--glass-blur-light', `${12 * gm}px`);
        root.style.setProperty('--glass-blur-medium', `${20 * gm}px`);
        root.style.setProperty('--glass-blur-heavy', `${32 * gm}px`);
        root.style.setProperty('--glass-blur-xl', `${40 * gm}px`);
        root.style.setProperty('--glass-bg-ultra-light', `rgba(255,255,255,${0.03 * gm})`);
        root.style.setProperty('--glass-bg-light', `rgba(255,255,255,${0.06 * gm})`);
        root.style.setProperty('--glass-bg-medium', `rgba(255,255,255,${0.1 * gm})`);
        root.style.setProperty('--glass-bg-heavy', `rgba(255,255,255,${0.15 * gm})`);
        root.style.setProperty('--glass-border-subtle', `rgba(255,255,255,${0.05 * gm})`);
        root.style.setProperty('--glass-border-light', `rgba(255,255,255,${0.1 * gm})`);
        root.style.setProperty('--glass-border-medium', `rgba(255,255,255,${0.15 * gm})`);
        root.style.setProperty('--glass-border-strong', `rgba(255,255,255,${0.2 * gm})`);
        root.style.setProperty('--glass-accent-glow', `rgba(var(--accent-rgb),${0.15 * gm})`);
        root.style.setProperty('--glass-card-bg', `linear-gradient(135deg, rgba(255,255,255,${0.12 * gm}) 0%, rgba(255,255,255,${0.03 * gm}) 100%)`);
        root.style.setProperty('--glass-card-border-top', `rgba(255,255,255,${0.18 * gm})`);
        root.style.setProperty('--glass-card-border-left', `rgba(255,255,255,${0.12 * gm})`);
        root.style.setProperty('--glass-card-border-bottom', `rgba(255,255,255,${0.06 * gm})`);
        root.style.setProperty('--glass-card-border-right', `rgba(255,255,255,${0.06 * gm})`);
        root.style.setProperty('--glass-modal-bg', `linear-gradient(180deg, rgba(20,20,20,${0.85 * gm}) 0%, rgba(10,10,10,${0.95 * gm}) 100%)`);
        root.style.setProperty('--glass-modal-border-top', `rgba(255,255,255,${0.12 * gm})`);
      })();

    </script>
    <style>
      html {
        background-color: #000000;
      }
      body {
        background-color: var(--bg-main);
        color: var(--text-main);
        margin: 0;
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
        transition: background-color 0.5s ease, color 0.5s ease;
        font-family: var(--app-font);
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-main);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-color);
      }
      
      :root {
        --accent-color: #E8E8E8;
        --accent-rgb: 232, 232, 232;
        --bg-main: #000000;
        --bg-card: #09090b;
        --bg-surface: #18181b;
        --border-color: #27272a;
        --text-main: #ffffff;
        --text-muted: #a1a1aa;
        --app-font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      
      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
      }
      input[type="color"]::-webkit-color-swatch {
        border: none;
        border-radius: 9999px;
      }
    </style>

</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
