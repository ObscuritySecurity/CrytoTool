
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self';" />
    <title>CrytoTool</title>
    
    <script>
      // Load saved theme immediately to prevent flash
      (function() {
        const savedTheme = JSON.parse(localStorage.getItem('app_theme_config') || '{}');
        // Manual accent override wins over theme config
        const manualAccent = localStorage.getItem('app_accent_manual');
        if (manualAccent) {
          savedTheme['--accent-color'] = manualAccent;
        }
        const savedFont = 'ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif';
        
        const root = document.documentElement;
        
        // Defaults — official branding: gold accent on charcoal
        const defaults = {
          '--accent-color': '#D4AF37',
          '--bg-main': '#2A2A2A',
          '--bg-card': '#1A1A1A',
          '--bg-surface': '#333333',
          '--border-color': '#3A3A3A',
          '--text-main': '#ffffff',
          '--text-muted': '#a1a1aa'
        };

        const config = { ...defaults, ...savedTheme };

        // Apply theme variables
        Object.entries(config).forEach(([key, val]) => {
          root.style.setProperty(key, val);
        });
        
        // Apply font variable
        root.style.setProperty('--app-font', savedFont);

        // Set RGB for accent alpha/opacity utilities
        const accentHex = config['--accent-color'];
        if (accentHex) {
           const r = parseInt(accentHex.slice(1, 3), 16);
           const g = parseInt(accentHex.slice(3, 5), 16);
           const b = parseInt(accentHex.slice(5, 7), 16);
           root.style.setProperty('--accent-rgb', `${r}, ${g}, ${b}`);
        }
      })();

    </script>
    <style>
      html {
        background-color: #000000;
      }
      body {
        background-color: var(--bg-main);
        color: var(--text-main);
        margin: 0;
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
        transition: background-color 0.5s ease, color 0.5s ease;
        font-family: var(--app-font);
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-main);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-color);
      }
      
      :root {
        --accent-color: #D4AF37;
        --accent-rgb: 212, 175, 55;
        --bg-main: #2A2A2A;
        --bg-card: #1A1A1A;
        --bg-surface: #333333;
        --border-color: #3A3A3A;
        --text-main: #ffffff;
        --text-muted: #a1a1aa;
        --app-font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      
      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
      }
      input[type="color"]::-webkit-color-swatch {
        border: none;
        border-radius: 9999px;
      }
    </style>

</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
